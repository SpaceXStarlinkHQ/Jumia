kind = "web"
previewPath = "/store/"
title = "Online Store"
version = "1.0.0"
id = "artifacts/store"
router = "path"

[[services]]
name = "web"
paths = [ "/store/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/store", "run", "build" ]
serve = "static"
publicDir = "artifacts/store/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/store/"
