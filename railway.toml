[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && node artifacts/api-server/build.mjs"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/products"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
